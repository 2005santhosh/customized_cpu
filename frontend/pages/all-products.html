        :root {
            --bg-gradient: radial-gradient(circle at 50% -20%, #2e3244 0%, #111116 60%, #000000 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #FFD600;
            --accent-hover: #E6C200;
            --text-main: #FFFFFF;
            --text-sec: #9CA3AF;
            --font-head: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-md: 12px;
            --success: #10B981;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
        }

        /* Background Pattern */
        .bg-pattern {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        a { text-decoration: none; color: inherit; transition: 0.2s; cursor: pointer; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; width: 100%; }

        /* Navbar */
        .navbar {
            position: sticky; top: 0; z-index: 100; 
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(16px); 
            border-bottom:1px solid var(--card-border); padding: 12px 0;
        }

        /* --- DESKTOP NAV (Default Visible) --- */
        .nav-desktop { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }

        /* --- MOBILE NAV (Default Hidden) --- */
        .nav-mobile { 
            display: none; /* FIX: Explicitly hide on desktop */
        }

        .nav-logo { font-family: var(--font-head); font-size: 24px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 5px;}
        .nav-logo span { color: var(--accent); }
        
        .badge { 
            position: absolute; top: -5px; right: -5px; 
            background: var(--accent); color: #000; 
            font-size: 10px; font-weight: bold; width: 18px; height: 18px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            border: 2px solid #000;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .badge.bump { transform: scale(1.4); }

        .nav-icons { display: flex; gap: 20px; align-items: center; position: relative; }
        .icon-btn { background: transparent; border: none; color: #fff; font-size: 20px; cursor: pointer; position: relative; transition: 0.2s; display: flex; align-items: center;}
        .icon-btn:hover { color: var(--accent); transform: translateY(-2px); }
        
        /* Profile Dropdown */
        .profile-dropdown { 
            position: absolute; top: 100%; right: 0; margin-top: 15px; 
            background: #1a1a1a; border: 1px solid var(--card-border); 
            border-radius: 8px; width: 200px; padding: 10px; 
            display: none; flex-direction: column; gap: 5px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 200; 
            transform-origin: top right;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .profile-dropdown.active { display: flex; }
        .profile-user { font-weight: 600; color: #fff; padding-bottom: 10px; border-bottom: 1px solid var(--card-border); margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .user-icon { color: var(--accent); }
        .logout-btn { background: rgba(255,255,255,0.05); color: #fff; border: none; padding: 10px; border-radius: 6px; text-align: left; font-size: 13px; transition: 0.2s; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logout-btn:hover { background: #ef4444; color: white; }

        /* Filter Header */
        .filter-header { display: flex; justify-content: space-between; align-items: center; margin-top: 50px; margin-bottom: 30px; animation: slideDown 0.5s ease; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .filter-title { font-family: var(--font-head); font-size: 36px; color: #fff; letter-spacing: -0.5px; }
        .reset-btn { 
            background: transparent; border: 1px solid var(--card-border); 
            color: var(--text-sec); padding: 10px 20px; border-radius: 6px; 
            cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 6px;
        }
        .reset-btn:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }

        /* Products Grid */
        .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; padding-bottom: 40px; }
        
        .product-card { 
            background: var(--card-bg); border: 1px solid var(--card-border); 
            border-radius: var(--radius-md); overflow: hidden; 
            display: flex; flex-direction: column; 
            transition: all 0.3s ease; 
            opacity: 0; /* Hidden initially for animation */
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        
        .product-card:hover { border-color: rgba(255, 255, 255, 0.3); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .p-top { height: 220px; background: #000; overflow: hidden; position: relative; }
        .p-top img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .product-card:hover .p-top img { transform: scale(1.05); }
        
        .p-bottom { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .p-cat { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-sec); margin-bottom: 6px; }
        .p-name { font-weight: 600; font-size: 18px; margin-bottom: 8px; color: #fff; }
        .p-desc { font-size: 13px; color: var(--text-sec); margin-bottom: 15px; line-height: 1.5; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .p-price { font-family: var(--font-head); font-size: 22px; color: var(--accent); margin-bottom: 20px; font-weight: 700; }
        
        .p-actions { display: grid; grid-template-columns:1fr 1.5fr; gap: 10px; }
        .btn { padding: 10px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        
        .btn-view { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--card-border); }
        .btn-view:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
        
        .btn-cart { background: #fff; color: #000; }
        .btn-cart:hover { background: var(--accent); color: #000; }
        
        /* Button State: Added */
        .btn-cart.added { background: var(--success); color: #fff; border-color: var(--success); pointer-events: none; }

        /* Footer */
        footer { margin-top: auto; border-top: 1px solid var(--card-border); background: #050505; color: var(--text-sec); padding: 30px 0; text-align: center; font-size: 14px; }

        /* Toast Notification */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: #1a1a1a; color: #fff; padding: 12px 20px; border-radius: 8px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 10px;
            animation: slideInRight 0.3s ease forwards;
            min-width: 250px;
        }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(10px); } }
        @keyframes fadeInUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- RESPONSIVE MEDIA QUERIES --- */
        @media (max-width: 1024px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
        
        @media (max-width: 768px) { 
            /* Hide Desktop Nav */
            .nav-desktop { display: none; } 
            /* Show Mobile Nav */
            .nav-mobile {

                justify-content: space-between; 
                align-items: center;

            .filter-title { font-size: 24px; } 
            .filter-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .reset-btn { width: 100%; justify-content: center; }
        }
        
        @media (max-width: 480px) { .products-grid { grid-template-columns: 1fr; } .p-top { height: 200px; } }

        // Logic to filter products based on URL parameters
        function initPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category');
            const pageTitle = document.getElementById('pageTitle');
            const resultCount = document.getElementById('resultCount');
            
            let displayProducts = productsData;

            if (category === 'gaming') {
                displayProducts = productsData.filter(p => p.category === 'gaming');
                pageTitle.innerText = "Gaming Desktops";
            } else if (category === 'workstation') {
                displayProducts = productsData.filter(p => p.category === 'workstation');
                pageTitle.innerText = "Pro Workstations";
            } else if (category === 'components') {
                displayProducts = productsData.filter(p => p.category === 'components');
                pageTitle.innerText = "PC Components";
            } else {
                pageTitle.innerText = "All Products";
            }

            resultCount.innerText = `Showing ${displayProducts.length} products`;
            renderProducts(displayProducts);
        }

        function renderProducts(data) {
            const grid = document.getElementById('fullProductsGrid');
            grid.innerHTML = '';

            if(data.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-sec);">
                    <i class="ri-ghost-line" style="font-size: 48px; display: block; margin-bottom: 10px;"></i>
                    No products found in this category.
                </div>`;
                return;
            }

            data.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                // Staggered animation delay
                card.style.animationDelay = `${index * 100}ms`;
                
                card.innerHTML = `
                    <div class="p-top"><img src="${p.img}" alt="${p.name}" loading="lazy"></div>
                    <div class="p-bottom">
                        <div class="p-cat">${p.category}</div>
                        <h3 class="p-name">${p.name}</h3>
                        <p class="p-desc">${p.desc}</p>
                        <div class="p-price">${p.price}</div>
                        <div class="p-actions">
                            <a href="product-details.html?id=${p.id}" class="btn btn-view">View</a>
                            <button class="btn btn-cart" onclick="addToCart(this, ${p.id})">
                                <i class="ri-shopping-cart-2-line"></i> Add
                            </button>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        // --- TOAST NOTIFICATION SYSTEM ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let icon = type === 'success' ? 'ri-checkbox-circle-fill' : 'ri-information-fill';
            let color = type === 'success' ? 'var(--success)' : '#ef4444';
            
            toast.style.borderLeftColor = color;
            toast.innerHTML = `<i class="${icon}" style="color:${color}; font-size:18px;"></i> ${message}`;
            
            container.appendChild(toast);

            // Remove after 3 seconds
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.5s ease forwards';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // --- AUTH & PROFILE (UPDATED FOR DB FETCH) ---
        async function initAuth() {
            const userSpan = document.getElementById('userNameDisplay');
            if (!userSpan) return;

            // 1. Retrieve Token from LocalStorage
            const token = localStorage.getItem('token');

            if (token) {
                try {
                    // 2. Fetch Real User Data from Backend
                    const response = await fetch(`${API_URL}/api/auth/me`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}` // Send token here
                        }
                    });
                    
                    const data = await response.json();

                    // DEBUG
                    console.log("Auth Response:", data);

                    if (response.ok && data.success) {
                        // 3. Display Real Name from Database
                        userSpan.innerText = data.user.name;
                        console.log("✅ Loaded user from DB:", data.user.name);
                    } else {
                        console.warn("Invalid Token");
                        userSpan.innerText = "Login";
                    }
                } catch (error) {
                    console.error("⚠️ Connection Error:", error);
                    userSpan.innerText = "Guest";
                }
            } else {
                // No token found
                userSpan.innerText = "Login";
            }
        }

        function toggleProfile() { 
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('active'); 
        }

        function handleLogout() { 
            localStorage.clear(); 
            showToast("Logging out...", "info");
            setTimeout(() => {
                window.location.href = 'index.html'; 
            }, 1000);
        }

        // --- CART LOGIC ---
        function addToCart(btnElement, id) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const product = productsData.find(p => p.id === id);
            
            cart.push(product);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            
            // Visual Feedback
            const originalText = btnElement.innerHTML;
            btnElement.classList.add('added');
            btnElement.innerHTML = `<i class="ri-check-line"></i> Added`;
            
            showToast(`Added <b>${product.name}</b> to cart`);

            setTimeout(() => {
                btnElement.classList.remove('added');
                btnElement.innerHTML = originalText;
            }, 2000);
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cartBadge');
            const badgeMobile = document.getElementById('cartBadgeMobile');
            
            // Bump animation trigger
            if(badge) {
                badge.innerText = cart.length;
                badge.classList.remove('bump');
                void badge.offsetWidth; // trigger reflow
                badge.classList.add('bump');
            }
            if(badgeMobile) badgeMobile.innerText = cart.length;
        }

        // Close dropdown when clicking outside
        window.onclick = function(event) {
            if (!event.target.closest('.icon-btn')) {
                const dropdown = document.getElementById('profileDropdown');
                if (dropdown) dropdown.classList.remove('active');
            }
        }

        // Initialize
        window.onload = function() {
            initAuth(); // Fetches user from DB
            updateCartBadge();
            initPage();
        };
    </script>
