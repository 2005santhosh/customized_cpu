<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COREX | All Products</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --ink: #0a0b0e;
            --ink-2: #111318;
            --ink-3: #181b22;
            --ink-4: #1f232d;
            --ink-5: #252a36;
            --panel: #1c1f28;
            --panel-2: #232733;
            --amber: #f59e0b;
            --amber-bright: #fbbf24;
            --amber-dim: #92400e;
            --amber-glow: rgba(245,158,11,0.18);
            --amber-glow-lg: rgba(245,158,11,0.08);
            --cyan: #22d3ee;
            --cyan-dim: #0e7490;
            --cyan-glow: rgba(34,211,238,0.15);
            --red: #ef4444;
            --white: #f1f3f9;
            --white-dim: #8892a4;
            --white-faint: #3d4457;
            --border: rgba(255,255,255,0.07);
            --border-amber: rgba(245,158,11,0.25);
            --border-cyan: rgba(34,211,238,0.2);
            --font-display: 'Bebas Neue', sans-serif;
            --font-ui: 'Barlow Condensed', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --r: 6px;
            --r-md: 10px;
            --r-lg: 16px;
        }

        *{margin:0;padding:0;box-sizing:border-box;outline:none;}
        html{scroll-behavior:smooth;}
        body{background:var(--ink);color:var(--white);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;}
        body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.6;}
        a{text-decoration:none;color:inherit;transition:0.2s;}ul{list-style:none;}img{display:block;max-width:100%;}button{cursor:pointer;border:none;background:none;}.hidden{display:none!important;}
        ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--ink-2);}::-webkit-scrollbar-thumb{background:var(--amber-dim);border-radius:4px;}
        .container{max-width:1360px;margin:0 auto;padding:0 24px;position:relative;z-index:2;width:100%;}

        /* ─── NAVBAR ─── */
        .navbar{position:sticky;top:0;z-index:100;background:rgba(10,11,14,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
        .nav-inner{display:flex;align-items:center;gap:16px;padding:14px 0;}
        .logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
        .logo-mark{width:38px;height:38px;border-radius:var(--r);background:var(--amber);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:20px;color:var(--ink);letter-spacing:0;flex-shrink:0;position:relative;overflow:hidden;}
        .logo-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.25) 0%,transparent 60%);}
        .logo-name{font-family:var(--font-display);font-size:26px;letter-spacing:2px;color:var(--white);line-height:1;}
        .logo-name span{color:var(--amber);}
        
        .nav-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
        .icon-btn{width:40px;height:40px;border-radius:var(--r);background:var(--ink-3);border:1px solid var(--border);color:var(--white-dim);font-size:18px;display:flex;align-items:center;justify-content:center;transition:0.2s;position:relative;}
        .icon-btn:hover{background:var(--amber);color:var(--ink);border-color:var(--amber);}
        .badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--ink);transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.5);}
        .badge.bump{transform:scale(1.5);}
        .profile-rel{position:relative;}
        .profile-dropdown{position:absolute;top:calc(100% + 10px);right:0;background:var(--panel-2);border:1px solid var(--border-amber);border-radius:var(--r-md);width:190px;padding:12px;display:none;flex-direction:column;gap:6px;box-shadow:0 16px 48px rgba(0,0,0,0.5);animation:dropIn 0.15s ease;}
        @keyframes dropIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
        .profile-dropdown.active{display:flex;}
        .profile-user{font-family:var(--font-ui);font-weight:600;font-size:14px;color:var(--white);padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
        .profile-user i{color:var(--amber);}
        .logout-btn{background:transparent;color:var(--white-dim);padding:8px 10px;border-radius:var(--r);text-align:left;font-size:12px;font-family:var(--font-body);transition:0.2s;display:flex;align-items:center;gap:8px;}
        .logout-btn:hover{background:#2d1515;color:#f87171;}
        .nav-mobile{display:none;align-items:center;justify-content:space-between;padding:12px 0;}

        /* ─── SECTION HEADER ─── */
        .sec-label{font-family:var(--font-mono);font-size:10px;letter-spacing:2.5px;color:var(--amber);text-transform:uppercase;display:flex;align-items:center;gap:10px;margin-bottom:10px;}
        .sec-label::before{content:'';width:20px;height:1px;background:var(--amber);}
        .sec-title{font-family:var(--font-display);font-size:clamp(32px,4vw,48px);letter-spacing:1px;color:var(--white);line-height:1;}
        .sec-title span{color:var(--amber);}
        .sec-header{display:flex;align-items:flex-end;justify-content:space-between;margin:40px 0 32px;gap:20px;}

        /* Reset Button styled as Ghost */
        .btn-reset {
            display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--white);font-family:var(--font-ui);font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:10px 20px;border-radius:var(--r);border:1px solid var(--border);transition:0.2s;cursor:pointer;flex-shrink:0;
        }
        .btn-reset:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-glow);}

        /* ─── PRODUCTS GRID ─── */
        .products-grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:16px;padding-bottom: 40px;}
        @media(max-width:1100px){.products-grid{grid-template-columns:repeat(3,1fr);}}
        @media(max-width:800px){.products-grid{grid-template-columns:repeat(2,1fr);}}
        @media(max-width:480px){.products-grid{grid-template-columns:1fr;}}

        .product-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;display:flex;flex-direction:column;transition:0.3s cubic-bezier(0.25,0.8,0.25,1);position:relative;}
        .product-card:hover{transform:translateY(-6px);box-shadow:0 20px 48px rgba(0,0,0,0.4);border-color:var(--border-amber);}
        
        /* Image Container - Changed to object-fit: contain as requested */
        .p-img{height:240px;background:var(--ink-3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:20px;flex-shrink:0;}
        .p-img::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(245,158,11,0.04) 1px, transparent 1px),linear-gradient(90deg, rgba(245,158,11,0.04) 1px, transparent 1px);background-size:24px 24px;}
        .p-img img{max-width:100%;max-height:100%;object-fit:contain;position:relative;z-index:1;transition:0.4s;filter:drop-shadow(0 6px 18px rgba(0,0,0,0.4));}
        .product-card:hover .p-img img{transform:scale(1.05);}
        .p-img::after{content:'';position:absolute;top:12px;right:12px;width:6px;height:6px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);animation:pulseDot 2s ease-in-out infinite;}
        @keyframes pulseDot{0%,100%{opacity:0.5;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
        
        .p-body{padding:16px;flex:1;display:flex;flex-direction:column;}
        .p-cat{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--amber);text-transform:uppercase;margin-bottom:8px;}
        .p-name{font-family:var(--font-ui);font-size:16px;font-weight:700;color:var(--white);margin-bottom:8px;line-height:1.3;letter-spacing:0.3px;}
        .p-desc{font-size:11.5px;color:var(--white-faint);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px;flex:1;}
        .p-price{font-family:var(--font-display);font-size:24px;letter-spacing:0.5px;color:var(--amber);margin-bottom:14px;}
        
        .p-actions{display:flex;gap:8px;}
        .btn-view{flex:1;padding:9px 12px;border-radius:var(--r);background:var(--ink-4);border:1px solid var(--border);font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--white-dim);cursor:pointer;transition:0.2s;text-align:center;display:flex;align-items:center;justify-content:center;}
        .btn-view:hover{background:var(--ink-5);border-color:var(--white-faint);color:var(--white);}
        .btn-cart{flex:1;padding:9px 12px;border-radius:var(--r);background:var(--amber);font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--ink);cursor:pointer;transition:0.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
        .btn-cart:hover{background:var(--amber-bright);box-shadow:0 4px 16px rgba(245,158,11,0.4);}
        .btn-cart.added{background:#064e3b;color:#6ee7b7;pointer-events:none;}

        /* ─── FOOTER ─── */
        footer{margin-top:auto;background:var(--ink-2);border-top:1px solid var(--border);padding:40px 0;text-align:center;font-size:13px;color:var(--white-faint);font-family:var(--font-body);}
        .footer-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;}
        .footer-logo .logo-mark{width:28px;height:28px;font-size:15px;}
        .footer-logo span{font-family:var(--font-display);font-size:22px;letter-spacing:2px;color:var(--white);}
        .footer-logo span span{color:var(--amber);}

        /* ─── TOAST ─── */
        #toast-container{position:fixed;bottom:28px;right:28px;z-index:999;display:flex;flex-direction:column;gap:10px;}
        .toast{background:var(--panel-2);border:1px solid var(--border-amber);color:var(--white);padding:12px 20px;border-radius:var(--r-md);box-shadow:0 12px 36px rgba(0,0,0,0.5);font-size:13px;font-weight:500;display:flex;align-items:center;gap:12px;animation:toastIn 0.3s ease;min-width:260px;}
        @keyframes toastIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
        @keyframes toastOut{to{opacity:0;transform:translateY(8px);}}
        .toast i{color:var(--amber);font-size:18px;}

        /* Mobile Nav */
        @media(max-width:768px){.nav-inner{display:none;}.nav-mobile{display:flex;}.sec-header{flex-direction:column;align-items:flex-start;gap:15px;}}
    </style>
</head>

        // Logic to filter products based on URL parameters
        function initPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category');
            const pageTitle = document.getElementById('pageTitle');
            const resultCount = document.getElementById('resultCount');
            
            let displayProducts = productsData;

            if (category === 'gaming') {
                displayProducts = productsData.filter(p => p.category === 'gaming');
                pageTitle.innerHTML = `Gaming <span>Desktops</span>`;
            } else if (category === 'workstation') {
                displayProducts = productsData.filter(p => p.category === 'workstation');
                pageTitle.innerHTML = `Pro <span>Workstations</span>`;
            } else if (category === 'components') {
                displayProducts = productsData.filter(p => p.category === 'components');
                pageTitle.innerHTML = `PC <span>Components</span>`;
            } else {
                pageTitle.innerHTML = `All <span>Products</span>`;
            }

            resultCount.innerText = `Showing ${displayProducts.length} products`;
            renderProducts(displayProducts);
        }

        function renderProducts(data) {
            const grid = document.getElementById('fullProductsGrid');
            grid.innerHTML = '';

            if(data.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--white-faint); font-family: var(--font-mono);">
                    <i class="ri-ghost-line" style="font-size: 48px; display: block; margin-bottom: 10px; color: var(--amber);"></i>
                    No products found in this category.
                </div>`;
                return;
            }

            data.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                card.innerHTML = `
                    <div class="p-img"><img src="${p.img}" alt="${p.name}" loading="lazy"></div>
                    <div class="p-body">
                        <div class="p-cat">// ${p.category}</div>
                        <h3 class="p-name">${p.name}</h3>
                        <p class="p-desc">${p.desc}</p>
                        <div class="p-price">${p.price}</div>
                        <div class="p-actions">
                            <a href="product-details.html?id=${p.id}" class="btn-view">View</a>
                            <button class="btn-cart" onclick="addToCart(this, ${p.id})">
                                <i class="ri-shopping-cart-2-line"></i> Add
                            </button>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        // --- TOAST NOTIFICATION SYSTEM ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let icon = type === 'success' ? 'ri-checkbox-circle-fill' : 'ri-information-fill';
            
            toast.innerHTML = `<i class="${icon}"></i> ${message}`;
            
            container.appendChild(toast);

            // Remove after 3 seconds
            setTimeout(() => {
                toast.style.animation = 'toastOut 0.5s ease forwards';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // --- AUTH & PROFILE (UPDATED FOR DB FETCH) ---
        async function initAuth() {
            const userSpan = document.getElementById('userNameDisplay');
            if (!userSpan) return;

            // 1. Retrieve Token from LocalStorage
            const token = localStorage.getItem('token');

            if (token) {
                try {
                    // 2. Fetch Real User Data from Backend
                    const response = await fetch(`${API_URL}/api/auth/me`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}` // Send token here
                        }
                    });
                    
                    const data = await response.json();

                    // DEBUG
                    console.log("Auth Response:", data);

                    if (response.ok && data.success) {
                        // 3. Display Real Name from Database
                        userSpan.innerText = data.user.name;
                        console.log("✅ Loaded user from DB:", data.user.name);
                    } else {
                        console.warn("Invalid Token");
                        userSpan.innerText = "Login";
                    }
                } catch (error) {
                    console.error("⚠️ Connection Error:", error);
                    userSpan.innerText = "Guest";
                }
            } else {
                // No token found
                userSpan.innerText = "Login";
            }
        }

        function toggleProfile() { 
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('active'); 
        }

        function handleLogout() { 
            localStorage.clear(); 
            showToast("Logging out...", "info");
            setTimeout(() => {
                window.location.href = 'shop.html'; 
            }, 1000);
        }

        // --- CART LOGIC ---
        function addToCart(btnElement, id) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const product = productsData.find(p => p.id === id);
            
            cart.push(product);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            
            // Visual Feedback
            const originalText = btnElement.innerHTML;
            btnElement.classList.add('added');
            btnElement.innerHTML = `<i class="ri-check-line"></i> Added`;
            
            showToast(`Added <b>${product.name}</b> to cart`);

            setTimeout(() => {
                btnElement.classList.remove('added');
                btnElement.innerHTML = originalText;
            }, 2000);
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cartBadge');
            const badgeMobile = document.getElementById('cartBadgeMobile');
            
            // Bump animation trigger
            if(badge) {
                badge.innerText = cart.length;
                badge.classList.remove('bump');
                void badge.offsetWidth; // trigger reflow
                badge.classList.add('bump');
            }
            if(badgeMobile) badgeMobile.innerText = cart.length;
        }

        // Close dropdown when clicking outside
        window.onclick = function(event) {
            if (!event.target.closest('.profile-rel')) {
                const dropdown = document.getElementById('profileDropdown');
                if (dropdown) dropdown.classList.remove('active');
            }
        }

        // Initialize
        window.onload = function() {
            initAuth(); // Fetches user from DB
            updateCartBadge();
            initPage();
        };
    </script>
