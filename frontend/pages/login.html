<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="./frontend/assets/images/logo.jpeg">
    <title>COREX | Secure Login</title>
    
    <!-- COREX FONTS: Syne & DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        /* ── COREX THEME VARIABLES ── */
        :root {
            /* Imported from Index */
            --bg-dark: #0D0D14;
            --bg-surface: rgba(255, 255, 255, 0.03);
            --purple: #6B2BFF;
            --purple-light: #8B5CF6;
            --blue: #1A6BFF;
            --blue-glow: rgba(26, 107, 255, 0.4);
            --white: #FFFFFF;
            --muted: #8888A0;
            --border: rgba(255, 255, 255, 0.08);
            --error: #ff4444;
            
            /* Layout */
            --font-head: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --card-radius: 24px;
            --card-padding: 48px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; min-height: 100vh; min-height: 100dvh;
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--white);
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* ── BACKGROUND EFFECTS (Matched to Index Hero) ── */
        
        /* 1. Noise Texture */
        .noise-overlay {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.07;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        }

        /* 2. Ambient Glow (Purple/Blue) */
        .ambient-glow {
            position: fixed; inset: 0; z-index: -1; overflow: hidden;
            background: radial-gradient(ellipse at 50% 0%, rgba(107,43,255,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(26,107,255,0.1) 0%, transparent 40%);
        }

        /* ── AUTH CARD ── */
        .auth-container {
            width: 100%; max-width: 440px; z-index: 10; position: relative;
        }

        .auth-card {
            width: 100%;
            background: rgba(20, 20, 26, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: var(--card-padding);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            animation: cardEntry 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0; transform: translateY(30px);
        }

        /* Top Border Accent */
        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--purple), transparent);
            opacity: 0.5;
        }

        @keyframes cardEntry {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── LOGO (COREX STYLE) ── */
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -0.5px;
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px;
        }
        .logo .x-blue { color: var(--blue); }
        .logo:hover .x-blue { color: var(--purple-light); transition: color 0.3s; }

        .subtitle { 
            color: var(--muted); 
            font-size: 14px; 
            text-align: center;
            margin-bottom: 40px; 
            font-weight: 400;
        }

        /* ── FORMS ── */
        .form-group { margin-bottom: 24px; position: relative; }
        
        label {
            display: block; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            color: var(--muted); 
            margin-bottom: 10px; 
            font-weight: 500;
        }

        .input-wrapper { position: relative; }
        
        .input-field {
            width: 100%; 
            padding: 16px 20px;
            background: var(--bg-surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--white); 
            font-family: var(--font-body); 
            font-size: 15px;
            outline: none; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .input-field::placeholder { color: rgba(255,255,255,0.2); }
        
        .input-field:focus {
            border-color: var(--purple);
            background: rgba(107, 43, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(107, 43, 255, 0.1);
        }
        
        .input-field.error { border-color: var(--error); }

        .error-text {
            color: var(--error); font-size: 12px; margin-top: 8px;
            display: flex; align-items: center; gap: 4px;
            opacity: 0; transform: translateY(-5px); transition: 0.3s;
            position: absolute;
        }
        .error-text.visible { opacity: 1; transform: translateY(0); position: relative; }

        .toggle-password {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            color: var(--muted); cursor: pointer; transition: 0.2s;
            font-size: 18px; padding: 4px;
        }
        .toggle-password:hover { color: var(--white); }

        /* ── BUTTONS ── */
        .btn-main {
            width: 100%; 
            padding: 16px;
            background: var(--purple); 
            color: var(--white);
            border: none; 
            border-radius: 50px; /* Pill shape like index */
            font-family: var(--font-body); 
            font-weight: 600; 
            font-size: 14px;
            letter-spacing: 0.5px;
            cursor: pointer; 
            text-transform: uppercase; 
            transition: all 0.3s ease;
            position: relative; 
            overflow: hidden;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 20px rgba(107, 43, 255, 0.3);
        }

        /* Shine effect */
        .btn-main::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }
        
        .btn-main:hover { 
            transform: translateY(-2px); 
            background: var(--purple-light); 
            box-shadow: 0 8px 30px rgba(107, 43, 255, 0.5);
        }
        .btn-main:hover::after { left: 150%; transition: 0.7s; }
        .btn-main:active { transform: translateY(0); }

        /* ── LINKS ── */
        .form-footer { margin-top: 32px; text-align: center; font-size: 13px; color: var(--muted); }
        .form-footer a { color: var(--white); text-decoration: none; font-weight: 600; transition: 0.3s; }
        .form-footer a:hover { color: var(--purple); text-decoration: underline; }

        .forgot-link {
            display: block; text-align: right; font-size: 12px; color: var(--muted);
            margin-top: -16px; margin-bottom: 32px; text-decoration: none; transition: 0.3s;
            font-weight: 500;
        }
        .forgot-link:hover { color: var(--blue); }

        /* ── LOADER ── */
        .loader {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite; display: none; flex-shrink: 0;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ── TOAST (COREX Style) ── */
        #toast {
            position: fixed; top: 24px;
            top: calc(24px + env(safe-area-inset-top, 0px));
            left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            color: #0D0D14;
            padding: 14px 28px; 
            border-radius: 50px;
            font-weight: 600; font-size: 13px;
            opacity: 0; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 1000;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            max-width: calc(100vw - 40px);
        }
        
        #toast.success { border-left: 4px solid var(--purple); }
        #toast.error { border-left: 4px solid var(--error); }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            :root {
                --card-radius: 20px;
                --card-padding: 32px 24px;
            }
            .logo { font-size: 24px; }
            .btn-main { padding: 14px; }
        }

        @media (max-height: 700px) {
            body { padding: 10px; align-items: flex-start; padding-top: 40px; }
            .auth-card { margin-bottom: 40px; }
        }
    </style>
</head>
<body>

    <!-- Background Layers -->
    <div class="ambient-glow"></div>
    <div class="noise-overlay"></div>

    <div class="auth-container">
        <div class="auth-card" id="card">
            
            <!-- COREX LOGO -->
            <a href="./index.html" class="logo">
                CORE<span class="x-blue">X</span>
            </a>
            
            <p class="subtitle">Welcome back. Log in to your dashboard.</p>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="input-field" placeholder="name@company.com" autocomplete="off" required>
                        <i class="ri-mail-line toggle-password" style="pointer-events: none; opacity: 0.5;"></i>
                    </div>
                    <div class="error-text" id="emailError"><i class="ri-error-warning-fill"></i> <span>Invalid email format</span></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="input-field" placeholder="•••••••" required>
                        <i class="ri-eye-off-line toggle-password" onclick="togglePass('password', this)"></i>
                    </div>
                    <div class="error-text" id="passError"><i class="ri-error-warning-fill"></i> <span>Password is required</span></div>
                </div>

                <a href="#" class="forgot-link" onclick="showToast('Reset link sent if account exists.')">Forgot password?</a>

                <button type="submit" class="btn-main" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                    <div class="loader"></div>
                </button>
            </form>

            <div class="form-footer">
                Don't have an account? <a href="signup.html">Create one</a>
            </div>
        </div>
    </div>

    <!-- Custom Toast -->
    <div id="toast">
        <i class="ri-checkbox-circle-fill"></i>
        <span id="toastMsg">Success</span>
    </div>

    <script>
       const API_URL = "https://api.core-x.in"; 

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('.btn-text');
        const loader = submitBtn.querySelector('.loader');
        
        function togglePass(id, icon) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('ri-eye-off-line');
                icon.classList.add('ri-eye-line');
            } else {
                input.type = "password";
                icon.classList.remove('ri-eye-line');
                icon.classList.add('ri-eye-off-line');
            }
        }

        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            const txt = document.getElementById('toastMsg');
            const icon = toast.querySelector('i');
            
            txt.textContent = msg;
            toast.className = type; // success or error class for border color
            
            icon.className = type === 'error' ? 'ri-error-warning-fill' : 'ri-checkbox-circle-fill';
            icon.style.color = type === 'error' ? 'var(--error)' : 'var(--purple)';
            
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                toast.style.transform = 'translateX(-50%) translateY(-100px)'; 
            }, 3000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email');
            const pass = document.getElementById('password');

            document.querySelectorAll('.input-field').forEach(i => i.classList.remove('error'));
            
            if(!email.value || !pass.value) {
                showToast('Please fill all fields', 'error');
                if(!email.value) email.classList.add('error');
                if(!pass.value) pass.classList.add('error');
                return;
            }

            btnText.style.display = 'none';
            loader.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email.value, password: pass.value })
                });
                
                const data = await response.json();

                if (response.ok && data.success) {
                    showToast('Login Successful', 'success');
                    
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                    }

                    setTimeout(() => {
                        window.location.href = 'shop';
                    }, 1000);
                } else {
                    showToast(data.message || 'Invalid credentials', 'error');
                }
            } catch (error) {
                showToast('Server connection failed', 'error');
            } finally {
                btnText.style.display = 'block';
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
