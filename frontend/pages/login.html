<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CPC | Secure Login</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        /* --- VARIABLES --- */
        :root {
            --bg-primary: #050505;
            --accent: #FFD600;
            --accent-glow: rgba(255, 214, 0, 0.4);
            --purple-deep: #4b0082;
            --text-main: #FFFFFF;
            --text-sec: #A1A1A1;
            --border: #2A2A2A;
            --error: #ff4444;
            --font-head: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --card-radius: 24px;
            --card-padding: 40px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; min-height: 100vh; min-height: 100dvh;
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* --- MESMERIZING BACKGROUND --- */
        
        /* 1. The Ambient Orbs */
        .ambient-bg {
            position: fixed; inset: 0; z-index: -3;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }

        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px);
            opacity: 0.6; animation: floatOrb 20s infinite alternate ease-in-out;
            will-change: transform;
        }

        .orb-1 {
            width: min(400px, 60vw); height: min(400px, 60vw);
            background: var(--accent);
            top: -10%; left: -10%; animation-duration: 25s;
        }
        .orb-2 {
            width: min(500px, 70vw); height: min(500px, 70vw);
            background: var(--purple-deep);
            bottom: -20%; right: -10%; animation-duration: 30s; animation-delay: -5s;
        }
        .orb-3 {
            width: min(300px, 50vw); height: min(300px, 50vw);
            background: #222;
            top: 40%; left: 40%; filter: blur(100px); animation-duration: 20s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
            100% { transform: translate(-20px, -30px) scale(0.9); }
        }

        /* 2. The Infinite Grid */
        .perspective-grid {
            position: absolute; bottom: -30%; left: -50%; width: 200%; height: 60%;
            background-image: 
                linear-gradient(var(--accent-glow) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-glow) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            z-index: -2;
            mask-image: linear-gradient(to bottom, transparent, black 40%);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 40%);
            animation: gridMove 10s linear infinite;
            opacity: 0.3;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(60px); }
        }

        /* 3. Noise Texture */
        .noise-overlay {
            position: fixed; inset: 0; z-index: -1;
            pointer-events: none; opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- AUTH CARD --- */
        .auth-container {
            width: 100%; max-width: 420px; z-index: 10;
        }

        .auth-card {
            width: 100%;
            background: rgba(15, 15, 15, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--card-radius);
            padding: var(--card-padding);
            box-shadow: 0 30px 60px -10px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
            animation: cardEntry 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0; transform: translateY(40px);
        }

        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
            animation: borderPulse 4s infinite ease-in-out;
        }

        @keyframes cardEntry {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes borderPulse {
            0%, 100% { opacity: 0.3; width: 80%; left: 10%; }
            50% { opacity: 0.8; width: 100%; left: 0%; }
        }

        /* --- TYPOGRAPHY --- */
        .logo {
            font-family: var(--font-head);
            font-size: 28px; font-weight: 700; letter-spacing: -1px;
            margin-bottom: 8px; display: inline-block; text-decoration: none; color: #fff;
            text-shadow: 0 0 20px rgba(255, 214, 0, 0.3);
        }
        .logo span { color: var(--accent); }
        .subtitle { color: var(--text-sec); font-size: 14px; margin-bottom: 32px; }

        /* --- FORMS --- */
        .form-group { margin-bottom: 24px; position: relative; }
        label {
            display: block; font-size: 11px; text-transform: uppercase; 
            letter-spacing: 1px; color: var(--text-sec); margin-bottom: 8px; font-weight: 600;
        }
        .input-wrapper { position: relative; }
        .input-field {
            width: 100%; padding: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff; font-family: var(--font-body); font-size: 16px; /* 16px prevents iOS zoom */
            outline: none; transition: all 0.3s ease;
        }
        .input-field::placeholder { font-size: 14px; color: rgba(255,255,255,0.25); }
        .input-field:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 20px rgba(255, 214, 0, 0.1);
        }
        .input-field.error { border-color: var(--error); }

        .error-text {
            color: var(--error); font-size: 12px; margin-top: 6px;
            display: flex; align-items: center; gap: 4px;
            opacity: 0; transform: translateY(-5px); transition: 0.3s;
            position: absolute;
        }
        .error-text.visible { opacity: 1; transform: translateY(0); position: relative; }

        .toggle-password {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-sec); cursor: pointer; transition: 0.2s;
            font-size: 18px; padding: 4px;
        }
        .toggle-password:hover { color: #fff; }

        /* --- BUTTONS --- */
        .btn-main {
            width: 100%; padding: 16px;
            background: var(--accent); color: #000;
            border: none; border-radius: 12px;
            font-family: var(--font-head); font-weight: 700; font-size: 16px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transition: 0.6s;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255, 214, 0, 0.3); }
        .btn-main:hover::after { left: 100%; }
        .btn-main:active { transform: translateY(0); }

        /* --- LINKS --- */
        .form-footer { margin-top: 24px; text-align: center; font-size: 14px; color: var(--text-sec); }
        .form-footer a { color: var(--accent); text-decoration: none; font-weight: 600; transition: 0.3s; }
        .form-footer a:hover { text-decoration: underline; text-shadow: 0 0 10px rgba(255,214,0,0.5); }

        .forgot-link {
            display: block; text-align: right; font-size: 12px; color: var(--text-sec);
            margin-top: -16px; margin-bottom: 24px; text-decoration: none; transition: 0.3s;
        }
        .forgot-link:hover { color: var(--accent); }

        /* --- LOADER --- */
        .loader {
            width: 20px; height: 20px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top: 2px solid #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite; display: none; flex-shrink: 0;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- TOAST (MOBILE SAFE) --- */
        #toast {
            position: fixed; top: 20px;
            top: calc(20px + env(safe-area-inset-top, 0px));
            left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #fff; color: #000;
            padding: 12px 24px; border-radius: 50px;
            font-weight: 600; font-size: 14px;
            opacity: 0; transition: 0.5s; z-index: 1000;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            white-space: nowrap;
            max-width: calc(100vw - 40px);
            max-width: calc(100vw - 40px - env(safe-area-inset-right, 0px) - env(safe-area-inset-left, 0px));
            overflow: hidden; text-overflow: ellipsis;
        }

        /* ============================================
           RESPONSIVE BREAKPOINTS
           ============================================ */

        /* Small phones (below 400px) */
        @media (max-width: 400px) {
            :root {
                --card-radius: 20px;
                --card-padding: 24px 20px;
            }

            .logo { font-size: 24px; }
            .subtitle { font-size: 13px; margin-bottom: 24px; }
            .form-group { margin-bottom: 20px; }
            .input-field { padding: 14px 12px; border-radius: 10px; }
            .toggle-password { right: 12px; font-size: 16px; }
            .btn-main { padding: 14px; font-size: 15px; border-radius: 10px; }
            .form-footer { font-size: 13px; margin-top: 20px; }
            .forgot-link { font-size: 11px; }

            /* Reduce blur for performance on weak devices */
            .orb { filter: blur(60px); opacity: 0.4; }
            .auth-card { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        }

        /* Standard phones (400px - 480px) */
        @media (min-width: 401px) and (max-width: 480px) {
            :root {
                --card-padding: 30px 24px;
            }
            .logo { font-size: 26px; }
        }

        /* Landscape phones (short height) */
        @media (max-height: 600px) and (orientation: landscape) {
            body { align-items: flex-start; padding-top: 10px; padding-bottom: 10px; }
            :root { --card-padding: 24px; --card-radius: 16px; }
            .logo { font-size: 22px; margin-bottom: 4px; }
            .subtitle { font-size: 12px; margin-bottom: 16px; }
            .form-group { margin-bottom: 14px; }
            .input-field { padding: 12px; }
            .forgot-link { margin-top: -10px; margin-bottom: 14px; }
            .form-footer { margin-top: 16px; }
            .orb { opacity: 0.3; }
            .perspective-grid { opacity: 0.15; height: 40%; }
        }

        /* Extra tall phones (like Samsung S Ultra) */
        @media (min-height: 800px) and (max-width: 480px) {
            body { align-items: center; }
        }

        /* Hover disabled on touch devices */
        @media (hover: none) and (pointer: coarse) {
            .btn-main:hover { transform: none; box-shadow: none; }
            .btn-main:hover::after { left: -100%; }
            .btn-main:active { transform: scale(0.98); box-shadow: 0 10px 30px rgba(255, 214, 0, 0.3); }
            .toggle-password:hover { color: var(--text-sec); }
            .forgot-link:hover { color: var(--text-sec); }
            .form-footer a:hover { text-decoration: none; text-shadow: none; }
        }
    </style>
</head>
<body>

    <!-- Background Layers -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="perspective-grid"></div>
    <div class="noise-overlay"></div>

    <div class="auth-container">
        <div class="auth-card" id="card">
            <a href="../index.html" class="logo">CPC<span>.</span></a>
            <p class="subtitle">Access your dashboard securely.</p>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="input-field" placeholder="name@company.com" autocomplete="off" required>
                        <i class="ri-mail-line toggle-password" style="pointer-events: none; opacity: 0.5;"></i>
                    </div>
                    <div class="error-text" id="emailError"><i class="ri-error-warning-fill"></i> <span>Invalid email format</span></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="input-field" placeholder="•••••••" required>
                        <i class="ri-eye-off-line toggle-password" onclick="togglePass('password', this)"></i>
                    </div>
                    <div class="error-text" id="passError"><i class="ri-error-warning-fill"></i> <span>Password is required</span></div>
                </div>

                <a href="#" class="forgot-link" onclick="showToast('Reset link sent if account exists.')">Forgot password?</a>

                <button type="submit" class="btn-main" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                    <div class="loader"></div>
                </button>
            </form>

            <div class="form-footer">
                Don't have an account? <a href="signup.html">Create one</a>
            </div>
        </div>
    </div>

    <!-- Custom Toast -->
    <div id="toast">
        <i class="ri-checkbox-circle-fill" style="color: #000; flex-shrink: 0;"></i>
        <span id="toastMsg">Success</span>
    </div>

    <script>
        const API_URL = "https://customizedcpu-production.up.railway.app"; 

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('.btn-text');
        const loader = submitBtn.querySelector('.loader');
        
        function togglePass(id, icon) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('ri-eye-off-line');
                icon.classList.add('ri-eye-line');
            } else {
                input.type = "password";
                icon.classList.remove('ri-eye-line');
                icon.classList.add('ri-eye-off-line');
            }
        }

        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            const txt = document.getElementById('toastMsg');
            const icon = toast.querySelector('i');
            txt.textContent = msg;
            icon.className = type === 'error' ? 'ri-error-warning-fill' : 'ri-checkbox-circle-fill';
            icon.style.color = type === 'error' ? '#ff4444' : '#000';
            
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                toast.style.transform = 'translateX(-50%) translateY(-120px)'; 
            }, 3000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email');
            const pass = document.getElementById('password');

            document.querySelectorAll('.input-field').forEach(i => i.classList.remove('error'));
            
            if(!email.value || !pass.value) {
                showToast('Please fill all fields', 'error');
                if(!email.value) email.classList.add('error');
                if(!pass.value) pass.classList.add('error');
                return;
            }

            btnText.style.display = 'none';
            loader.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email.value, password: pass.value })
                });
                
                const data = await response.json();

                if (response.ok && data.success) {
                    showToast('Login Successful', 'success');
                    
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                    }

                    setTimeout(() => {
                        window.location.href = 'shop.html';
                    }, 1000);
                } else {
                    showToast(data.message || 'Invalid credentials', 'error');
                }
            } catch (error) {
                showToast('Server connection failed', 'error');
            } finally {
                btnText.style.display = 'block';
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
